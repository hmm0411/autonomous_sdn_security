version: "3.9"

networks:
  sdn-net:
    driver: bridge

services:
  controller:
    build: onosproject/onos:2.7.0
    container_name: onos-controller
    ports:
      - "8181:8181" # Web GUI & REST API
      - "6653:6653" # Port giao tiếp OpenFlow với Mininet
      - "8101:8101" # Karaf SSH
    networks:
      - sdn-net
    environment:
      # Tự động kích hoạt các App cần thiết của ONOS khi khởi động
      - ONOS_APPS=drivers,openflow,fwd,proxyarp,topology

  rl-agent:
    build: ./rl_engine
    depends_on:
      - controller
    ports:
      - "8000:8000" # Port API của RL Agent
      - "9000:9000" # Port để RL Agent expose metrics cho Prometheus
    networks:
      - sdn-net
    volumes:
      - ./rl_engine:/app # Mount the rl_engine directory to /app in the container
      - ./models:/app/models # Mount the models directory to /app/models in the container

  # twin:
  #   build: ./digital_twin
  #   depends_on:
  #     - controller
  #   networks:
  #     - sdn-net

  mlflow:
    build: ./mlops
    environment:
      - SERVICE_MODE=mlflow
    ports:
      - "5000:5000"
    command: python main.py
    networks:
      - sdn-net
    volumes:
      - ./mlruns:/mlruns # Mount mlruns directory for MLflow tracking data
      - ./mlflow.db:/mlflow.db # Mount mlflow.db for MLflow metadata storage
        
  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    networks:
      - sdn-net
    volumes:
      - ./mlops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./mlops/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml
    
  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    networks:
      - sdn-net
    volumes:
      - grafana-storage:/var/lib/grafana
    
  alertmanager:
    image: prom/alertmanager
    ports:
      - "9093:9093"
    networks:
      - sdn-net
    volumes:
      - ./mlops/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
  
  auto-trigger:
    build: ./mlops
    environment:
      - SERVICE_MODE=trigger
    ports:
      - "5001:5001"
    command: python main.py
    depends_on:
      - alertmanager
    networks:
      - sdn-net

volumes:
  grafana-storage: