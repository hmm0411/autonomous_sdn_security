version: "3.8"

networks:
  sdn-net:
    driver: bridge

services:
  controller:
    image: onosproject/onos:2.7.0
    container_name: onos-controller
    ports:
      - "8181:8181" # Web GUI & REST API
      - "6653:6653" # Port giao tiếp OpenFlow với Mininet
      - "8101:8101" # Karaf SSH
    networks:
      - sdn-net
    environment:
      # Tự động kích hoạt các App cần thiết của ONOS khi khởi động
      - ONOS_APPS=drivers,openflow,gui,fwd,proxyarp,hostprovider,linkprovider,flowruleprovider,statisticspublisher,prometheus
      - ONOS_AUTO_START=true
    restart: always

# --- SERVICE TỰ ĐỘNG KHỞI TẠO DỮ LIỆU DEMO ---
  # demo-initializer:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: demo-initializer
  #   depends_on:
  #     - mlflow
  #   networks:
  #     - sdn-net
  #   volumes:
  #     - .:/app
  #     - ./models:/app/models
  #   environment:
  #     - PYTHONPATH=/app
  #   command: python demo_init.py

  # Container chạy DQN
  # Container chạy DQN
  rl-agent-dqn:
    restart: "no"
    tty: true
    build: .
    container_name: rl-agent-dqn
    depends_on:
      - mlflow
    networks:
      - sdn-net
    volumes:
      - .:/app
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - MLFLOW_S3_ENDPOINT_URL=http://s3:9005
    # command: >
    #   sh -c "python train_dqn.py && sleep 5"
    entrypoint: ["sh", "-c", "python -m rl_engine.agent.api_serving"]
  # Container chạy PPO
  rl-agent-ppo:
    restart: "no"
    tty: true
    build: .
    container_name: rl-agent-ppo
    depends_on:
      - mlflow
    networks:
      - sdn-net
    volumes:
      - .:/app
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - MLFLOW_S3_ENDPOINT_URL=http://s3:9005
    # command: >
    #   sh -c "python train_ppo.py && sleep 5"
    # THAY DÒNG CŨ BẰNG DÒNG NÀY:
    entrypoint: ["sh", "-c", "python -m rl_engine.agent.train_ppo"]
  #   restart: on-failure
  # rl-serving:
  #   build: .
  #   ports:
  #     - "8000:8000"
  #     - "9100:9100"
  #   depends_on:
  #     - mlflow
  #   networks:
  #     - sdn-net
  #   environment:
  #     - MLFLOW_TRACKING_URI=http://mlflow:5000
  #     - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
  #     - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
  #     - MLFLOW_S3_ENDPOINT_URL=http://s3:9005
  #   command: python -m rl_engine.agent.serving_dq
  # twin:
  #   build: ./digital_twin
  #   depends_on:
  #     - controller
  #   networks:
  #     - sdn-net

  promote:
    build: .
    container_name: mlflow-promote
    depends_on:
      - rl-agent-dqn
      - rl-agent-ppo
    networks:
      - sdn-net
    volumes:
      - .:/app
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    command: python mlops/promote.py
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.0.0
    container_name: mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    environment:
      - BACKEND_STORE_URI=sqlite:////mlflow/mlflow.db
      - DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - MLFLOW_S3_ENDPOINT_URL=http://s3:9005
    #command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:////mlflow/mlflow.db --default-artifact-root /mlflow/artifacts --allowed-hosts "*"
    depends_on:
      - s3
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlruns/mlflow.db
      --default-artifact-root s3://mlflow-artifacts
    networks:
      - sdn-net
    #healthcheck:
    #  test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
    #  interval: 10s
    #  timeout: 5s
    #  retries: 5

  # Control Loop
  control_loop:
    build:
      context: .
      dockerfile: ./control_loop/Dockerfile
    container_name: control_loop
    depends_on:
      - controller
      - rl-serving-dqn
      - rl-serving-ppo
      - mlflow
    networks:
      - sdn-net
    environment:
      - PYTHONUNBUFFERED=1
      - MLFLOW_TRACKING_URI=http://mlflow:5000
        
  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    networks:
      - sdn-net
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    
  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - sdn-net
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/sdn_rl_dashboard.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./grafana/dashboard.yml:/etc/grafana/provisioning/dashboards/dashboard.yml:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  # AlertManager
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - "9093:9093"
    networks:
      - sdn-net
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    restart: unless-stopped
  
  # Auto Trigger (MLOps)
  auto-trigger:
    build:
      context: ./mlops
      dockerfile: Dockerfile
    container_name: auto-trigger
    ports:
      - "5001:5001"
    networks:
      - sdn-net
    environment:
      - SERVICE_MODE=trigger
      - PYTHONUNBUFFERED=1
    command: python main.py
    depends_on:
      - alertmanager
    restart: on-failure

  # dashboard
  # 1. Service tự động lấy metric và ra quyết định (Volume-based)
  defense-agent:
    image: python:3.10-slim
    container_name: sdn-defense-agent
    volumes:
      - .:/app
    working_dir: /app
    # MÌNH ĐÃ THÊM prometheus_client VÀO DÒNG DƯỚI NÀY:
    command: >
      sh -c "pip install pandas numpy requests prometheus_client && python realtime_pipeline.py"
    networks:
      - sdn-net
    depends_on:
      - controller
    restart: unless-stopped

  # 2. Service Dashboard
  dashboard:
    image: python:3.10-slim
    container_name: sdn-dashboard
    volumes:
      - .:/app
    working_dir: /app
    # Thêm prometheus_client vào lệnh dưới đây:
    command: >
      sh -c "pip install streamlit pandas numpy requests prometheus_client && streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    networks:
      - sdn-net
    depends_on:
      - defense-agent
    restart: unless-stopped

  s3:
    image: minio/minio:latest
    container_name: mlflow_minio
    ports:
      - "9005:9005" # Đổi cổng public ra ngoài thành 9005
      - "9001:9001" # Cổng giao diện Web (Console) giữ nguyên hoặc đổi tùy ý
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    # Thêm tham số --address để MinIO chuyển từ 9000 sang 9005
    command: server /data --address ":9005" --console-address ":9001"
    networks:
      - sdn-net

  s3-setup:
    image: minio/mc:latest
    container_name: mlflow_minio_setup
    depends_on:
      - s3
    networks:
      - sdn-net
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      mc alias set myminio http://s3:9005 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb myminio/mlflow-artifacts || true;
      # Cấu trúc lệnh mới của MinIO để set public
      mc anonymous set public myminio/mlflow-artifacts;
      exit 0;
      "

  rl-serving-dqn:
    build: .
    container_name: rl-serving-dqn
    networks:
      - sdn-net
    ports:
      - "8000:8000" # Port cho Flask API
      - "9002:9002" # THÊM DÒNG NÀY: Port cho Prometheus Metrics cào dữ liệu
    entrypoint: ["python", "-m", "rl_engine.agent.api_serving", "--port", "8000"]
    # command: python3 -m rl_engine.agent.api_serving --port 8000
    environment:
      - MODEL_TYPE=dqn
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - MLFLOW_S3_ENDPOINT_URL=http://s3:9005
    depends_on:
      - mlflow
      - s3
    volumes:
      - .:/app

  rl-serving-ppo:
    build: .
    container_name: rl-serving-ppo
    networks:
      - sdn-net
    volumes:
      - .:/app
    ports:
      - "8001:8001" # Port cho Flask API
      - "9003:9003" # THÊM DÒNG NÀY: Port cho Prometheus Metrics cào dữ liệu
    # command: python3 -m rl_engine.agent.api_serving --port 
    entrypoint: ["python", "-m", "rl_engine.agent.api_serving", "--port", "8001"]
    environment:
      - MODEL_TYPE=ppo
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - MLFLOW_S3_ENDPOINT_URL=http://s3:9005
    depends_on:
      - mlflow
      - s3

volumes:
  mlflow_data:
  prometheus_data:
  grafana_data:
  minio_data: