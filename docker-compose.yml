version: "3.9"

networks:
  sdn-net:
    driver: bridge

services:
  controller:
    build: ./infra/controller
    ports:
      - "8181:8181"
    networks:
      - sdn-net

  # Container chạy DQN
  rl-agent-dqn:
    build: ./rl_engine
    container_name: rl-agent-dqn
    depends_on:
      - controller
    ports:
      - "8000:8000"
      - "9000:9000"
    networks:
      - sdn-net
    volumes:
      - ./rl_engine:/app
      - ./models:/app/models
    command: python3 -m rl_engine.agent.train_dqn

  # Container chạy PPO
  rl-agent-ppo:
    build: ./rl_engine
    container_name: rl-agent-ppo
    depends_on:
      - controller
    ports:
      - "8001:8000"
      - "9001:9001"
    networks:
      - sdn-net
    volumes:
      - ./rl_engine:/app
      - ./models:/app/models
    command: python3 -m rl_engine.agent.train_ppo

  twin:
    build: ./digital_twin
    depends_on:
      - controller
    networks:
      - sdn-net

  mlflow:
    image: ghcr.io/mlflow/mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlruns
      --host 0.0.0.0
    volumes:
      - ./mlruns:/mlruns
      - ./mlflow.db:/mlflow.db
    ports:
      - "5000:5000"
    networks:
      - sdn-net

  control_loop:
    build:
      context: .
      dockerfile: ./control_loop/Dockerfile
    container_name: control_loop
    depends_on:
      - controller
      - rl-agent-dqn
      - rl-agent-ppo
    networks:
      - sdn-net

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    networks:
      - sdn-net
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    networks:
      - sdn-net
    volumes:
      - grafana-storage:/var/lib/grafana

  alertmanager:
    image: prom/alertmanager
    ports:
      - "9093:9093"
    networks:
      - sdn-net
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml

  auto-trigger:
    build: ./mlops
    depends_on:
      - alertmanager
    ports:
      - "5001:5001"
    networks:
      - sdn-net
    volumes:
      - ./mlops:/app

volumes:
  grafana-storage: