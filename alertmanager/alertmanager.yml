global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "cluster", "service"]
  group_wait: 5s
  group_interval: 30s
  repeat_interval: 5m
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "critical"
    - match:
        severity: warning
      receiver: "warning"

receivers:
  - name: "default"
    webhook_configs:
      - url: "http://auto-trigger:5001/alert-webhook"
        send_resolved: true

  - name: "critical"
    webhook_configs:
      - url: "http://auto-trigger:5001/alert-webhook"
        send_resolved: true

  - name: "warning"
    webhook_configs:
      - url: "http://auto-trigger:5001/alert-webhook"
        send_resolved: true
