# k8s/rl-components.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rl-serving-dqn
  namespace: sdn-security
spec:
  replicas: 1
  selector: { matchLabels: { app: rl-serving-dqn } }
  template:
    metadata:
      labels: { app: rl-serving-dqn }
    spec:
      securityContext: { runAsUser: 0 }
      containers:
        - name: serving
          image: hmm0411/sdn-rl-serving:latest
          command: ["python", "-u", "control_loop/serving.py"]
          args: ["--port", "8000"]
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: PYTHONPATH
              value: "/app"
            - name: MODEL_TYPE
              value: "dqn"
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow:5000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rl-serving-ppo
  namespace: sdn-security
spec:
  replicas: 1
  selector: { matchLabels: { app: rl-serving-ppo } }
  template:
    metadata:
      labels: { app: rl-serving-ppo }
    spec:
      securityContext: { runAsUser: 0 }
      containers:
        - name: serving
          image: hmm0411/sdn-rl-serving:latest
          command: ["python", "-u", "control_loop/serving.py"]
          args: ["--port", "8001"]
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: PYTHONPATH
              value: "/app"
            - name: MODEL_TYPE
              value: "ppo"
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow:5000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rl-agent-dqn
  namespace: sdn-security
spec:
  replicas: 1
  selector: { matchLabels: { app: rl-agent-dqn } }
  template:
    metadata: { labels: { app: rl-agent-dqn } }
    spec:
      containers:
        - name: trainer
          image: hmm0411/sdn-rl-agent:latest
          command: ["python", "rl_engine/agent/train_dqn.py"]
          env:
            - name: PYTHONPATH
              value: "/app"
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow:5000"
            - name: MINIO_ROOT_USER
              value: "minioadmin"
            - name: MINIO_ROOT_PASSWORD
              value: "minioadmin"
          volumeMounts:
            - name: data-volume
              mountPath: /app/data
      volumes:
        - name: data-volume
          hostPath:
            path: /home/g23520964/autonomous_sdn_security/data
---
