metadata: { name: rl-serving-ppo, namespace: sdn-security }
spec:
  type: NodePort
  selector: { app: rl-serving-ppo }
  ports:
    - name: http
      port: 8001
      targetPort: 8001
    - name: metrics
      port: 9003
      targetPort: 9003
      nodePort: 30003
---
apiVersion: v1
kind: Service
metadata: { name: prometheus, namespace: sdn-security }
spec:
  type: NodePort
  selector: { app: prometheus }
  ports: [{ port: 9090, targetPort: 9090, nodePort: 30090 }]
---
apiVersion: v1
kind: Service
metadata: { name: grafana, namespace: sdn-security }
spec:
  type: NodePort
  selector: { app: grafana }
  ports: [{ port: 3000, targetPort: 3000, nodePort: 30000 }]
---
apiVersion: v1
kind: Service
metadata: { name: alertmanager, namespace: sdn-security }
spec:
  type: NodePort
  selector: { app: alertmanager }
  ports: [{ port: 9093, targetPort: 9093, nodePort: 30093 }]
---
apiVersion: v1
kind: Service
metadata: { name: control-loop, namespace: sdn-security }
spec:
  selector: { app: control-loop }
  ports: [{ port: 9100, targetPort: 9100 }]
---
apiVersion: v1
kind: Service
metadata: { name: sdn-defense-agent, namespace: sdn-security }
spec:
  selector: { app: sdn-defense-agent }
  ports: [{ port: 8000, targetPort: 8000 }]
---
apiVersion: v1
kind: Service
metadata: { name: sdn-dashboard, namespace: sdn-security }
spec:
  type: NodePort
  selector: { app: sdn-dashboard }
  ports: [{ port: 8501, targetPort: 8501, nodePort: 30501 }]
---
apiVersion: v1
kind: Service
metadata: { name: auto-trigger, namespace: sdn-security }
spec:
  selector: { app: auto-trigger }
  ports: [{ port: 5001, targetPort: 5001 }]
