spec:
  type: NodePort
  selector: { app: s3 }
  ports:
    - name: api
      port: 9005
      targetPort: 9005
      nodePort: 30005
    - name: console
      port: 9001
      targetPort: 9001
      nodePort: 30001
---
apiVersion: v1
kind: Service
metadata: { name: mlflow, namespace: sdn-security }
spec:
  type: NodePort
  selector: { app: mlflow }
  ports: [{ port: 5000, targetPort: 5000, nodePort: 30007 }]
---
apiVersion: v1
kind: Service
metadata: { name: controller, namespace: sdn-security }
spec:
  type: NodePort
  selector: { app: controller }
  ports: [{ port: 8181, targetPort: 8181, nodePort: 30081 }]
---
apiVersion: v1
