# ==========================================
# CONTROL LOOP (Vòng lặp tương tác ONOS <-> RL)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-loop
  namespace: sdn-security
spec:
  replicas: 1
  selector:
    matchLabels:
      app: control-loop
  template:
    metadata:
      labels:
        app: control-loop
    spec:
      containers:
        - name: loop
          image: hmm0411/sdn-control-loop:latest
          command: ["python", "control_loop/main_loop.py"]
          ports:
            - containerPort: 9100 # Metrics của metrics.py
---
apiVersion: v1
kind: Service
metadata:
  name: control-loop
  namespace: sdn-security
spec:
  selector:
    app: control-loop
  ports:
    - port: 9100
      targetPort: 9100
---
# ==========================================
# AUTO TRIGGER (Nhận Webhook & Kích hoạt Job)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auto-trigger
  namespace: sdn-security
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auto-trigger
  template:
    metadata:
      labels:
        app: auto-trigger
    spec:
      serviceAccountName: auto-trigger-sa # Cấp quyền tạo Job cho container này
      containers:
        - name: trigger
          image: hmm0411/sdn-auto-trigger:latest
          command: ["python", "main.py"]
          ports:
            - containerPort: 5001
---
apiVersion: v1
kind: Service
metadata:
  name: auto-trigger
  namespace: sdn-security
spec:
  selector:
    app: auto-trigger
  ports:
    - port: 5001
      targetPort: 5001
