apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-loop
  namespace: sdn-security
spec:
  replicas: 1
  template:
    metadata:
      labels:
        app: control-loop
    spec:
      containers:
        - name: loop
          image: hmm0411/sdn-control-loop:latest
          env:
            - name: PYTHONPATH
              value: "/app"
          command: ["python", "control_loop/main_loop.py"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auto-trigger
  namespace: sdn-security
spec:
  replicas: 1
  template:
    metadata:
      labels:
        app: auto-trigger
    spec:
      serviceAccountName: auto-trigger-sa
      containers:
        - name: trigger
          image: hmm0411/sdn-auto-trigger:latest
          env:
            - name: PYTHONPATH
              value: "/app"
          command: ["python", "main.py"]
