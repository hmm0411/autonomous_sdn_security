apiVersion: v1
kind: Service
metadata:
  name: s3
  namespace: sdn-security
spec:
  selector: { app: s3 }
  ports:
    - name: api
      port: 9005
      targetPort: 9005
    - name: console
      port: 9001
      targetPort: 9001
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: sdn-security
spec:
  selector: { app: mlflow }
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: rl-serving-dqn
  namespace: sdn-security
spec:
  selector: { app: rl-serving-dqn }
  ports:
    - name: http
      port: 8000
      targetPort: 8000
    - name: metrics
      port: 9002
      targetPort: 9002
