apiVersion: v1
kind: Service
metadata:
  name: s3
  namespace: sdn-security
spec:
  type: NodePort
  selector: { app: s3 }
  ports:
    - name: api
      port: 9005
      targetPort: 9005
      nodePort: 30005
    - name: console
      port: 9001
      targetPort: 9001
      nodePort: 30001
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: sdn-security
spec:
  type: NodePort
  selector: { app: mlflow }
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30006 # Truy cập qua http://<IP>:30006
---
apiVersion: v1
kind: Service
metadata:
  name: rl-serving-dqn
  namespace: sdn-security
spec:
  type: NodePort
  selector: { app: rl-serving-dqn }
  ports:
    - name: http
      port: 8000
      targetPort: 8000
    - name: metrics
      port: 9002
      targetPort: 9002
      nodePort: 30002
---
apiVersion: v1
kind: Service
metadata:
  name: rl-serving-ppo
  namespace: sdn-security
spec:
  type: NodePort
  selector: { app: rl-serving-ppo }
  ports:
    - name: http
      port: 8001
      targetPort: 8001
    - name: metrics
      port: 9003
      targetPort: 9003
      nodePort: 30003
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: sdn-security
spec:
  type: NodePort
  selector: { app: prometheus }
  ports:
    - port: 9090
      nodePort: 30090
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: sdn-security
spec:
  type: NodePort
  selector: { app: grafana }
  ports:
    - port: 3000
      nodePort: 30000
---
apiVersion: v1
kind: Service
metadata:
  name: control-loop
  namespace: sdn-security
spec:
  selector: { app: control-loop }
  ports: [{ port: 9100, targetPort: 9100 }]
---
apiVersion: v1
kind: Service
metadata:
  name: sdn-defense-agent
  namespace: sdn-security
spec:
  selector: { app: sdn-defense-agent }
  ports: [{ port: 8000, targetPort: 8000 }]
