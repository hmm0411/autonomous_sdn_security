apiVersion: apps/v1
kind: Deployment
metadata:
  name: sdn-dashboard
  namespace: sdn-security
spec:
  replicas: 1
  selector: { matchLabels: { app: sdn-dashboard } }
  template:
    metadata: { labels: { app: sdn-dashboard } }
    spec:
      containers:
        - name: dashboard
          image: python:3.10-slim
          # Cài đặt thư viện trước, rồi mới chạy lệnh
          command: ["/bin/bash", "-c"]
          args:
            [
              "pip install streamlit pandas numpy requests prometheus_client && streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0",
            ]
          ports: [{ containerPort: 8501 }]
          volumeMounts:
            - name: app-source
              mountPath: /app
      volumes:
        - name: app-source
          hostPath:
            path: /home/g23520964/autonomous_sdn_security # Đảm bảo đường dẫn này đúng trên VM
---
apiVersion: v1
kind: Service
metadata:
  name: sdn-dashboard
  namespace: sdn-security
spec:
  type: NodePort
  selector: { app: sdn-dashboard }
  ports:
    - port: 8501
      targetPort: 8501
      nodePort: 30501 # Truy cập qua http://<IP>:30501
