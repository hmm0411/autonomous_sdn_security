apiVersion: apps/v1
kind: Deployment
metadata:
  name: sdn-dashboard
  namespace: sdn-security
spec:
  replicas: 1
  selector: { matchLabels: { app: sdn-dashboard } }
  template:
    metadata: { labels: { app: sdn-dashboard } }
    spec:
      containers:
        - name: dashboard
          image: python:3.10-slim
          command:
            [
              "sh",
              "-c",
              "pip install streamlit ... && streamlit run dashboard.py",
            ]
          ports: [{ containerPort: 8501 }]
---
apiVersion: v1
kind: Service
metadata:
  name: sdn-dashboard
  namespace: sdn-security
spec:
  type: NodePort
  selector: { app: sdn-dashboard }
  ports:
    - port: 8501
      targetPort: 8501
      nodePort: 30501 # Truy cập qua http://<IP>:30501
