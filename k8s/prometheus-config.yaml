apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: sdn-security
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
      - job_name: 'rl-agent-dqn'
        static_configs:
          - targets: ['rl-agent-dqn:9002']
