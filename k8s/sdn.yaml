apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller
  namespace: sdn-security
spec:
  replicas: 1
  selector:
    matchLabels:
      app: controller
  template:
    metadata:
      labels:
        app: controller
    spec:
      containers:
        - name: onos
          image: onosproject/onos:2.7.0
          ports:
            - containerPort: 8181
            - containerPort: 6653
---
apiVersion: v1
kind: Service
metadata:
  name: controller
  namespace: sdn-security
spec:
  type: NodePort
  selector:
    app: controller
  ports:
    - port: 8181
      targetPort: 8181
      nodePort: 30081
