# 1. MINIO STORAGE & SETUP BUCKET
apiVersion: apps/v1
kind: StatefulSet
metadata: { name: s3, namespace: sdn-security }
spec:
  serviceName: "s3"
  replicas: 1
  selector: { matchLabels: { app: s3 } }
  template:
    metadata: { labels: { app: s3 } }
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          command: ["minio"]
          args:
            [
              "server",
              "/data",
              "--address",
              ":9005",
              "--console-address",
              ":9001",
            ]
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                { secretKeyRef: { name: minio-credentials, key: ACCESS_KEY } }
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                { secretKeyRef: { name: minio-credentials, key: SECRET_KEY } }
          volumeMounts: [{ name: data, mountPath: /data }]
      volumes:
        - name: data
          hostPath: { path: /var/lib/rancher/k3s/storage/minio-data }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: s3-setup-job
  namespace: sdn-security
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: s3-setup
          image: minio/minio:latest
          env:
            - name: MINIO_PROMETHEUS_AUTH_TYPE
              value: "public"
            - name: MINIO_ROOT_USER
              valueFrom:
                { secretKeyRef: { name: minio-credentials, key: ACCESS_KEY } }
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                { secretKeyRef: { name: minio-credentials, key: SECRET_KEY } }
          command:
            - /bin/sh
            - -c
            - |
              sleep 10;
              mc alias set myminio http://s3:9005 $(MINIO_ROOT_USER) $(MINIO_ROOT_PASSWORD);
              mc mb myminio/mlflow-artifacts || true;
              mc anonymous set public myminio/mlflow-artifacts;
---
# 2. MLFLOW
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: sdn-security
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v3.0.0
          command:
            - "sh"
            - "-c"
            - |
              pip install boto3 &&
              mlflow server \
                --host 0.0.0.0 \
                --port 5000 \
                --backend-store-uri sqlite:////mlflow/mlflow.db \
                --default-artifact-root s3://mlflow-artifacts
          ports:
            - containerPort: 5000
          env:
            - name: MLFLOW_S3_ENDPOINT_URL
              value: "http://s3:9005"
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: ACCESS_KEY
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: SECRET_KEY
          volumeMounts:
            - name: mlflow-data
              mountPath: /mlflow
      volumes:
        - name: mlflow-data
          hostPath:
            path: /var/lib/rancher/k3s/storage/mlflow-data
            type: DirectoryOrCreate
---
# 3. ONOS CONTROLLER
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller
  namespace: sdn-security
spec:
  replicas: 1
  selector: { matchLabels: { app: controller } }
  template:
    metadata: { labels: { app: controller } }
    spec:
      hostNetwork: true
      containers:
        - name: onos
          image: onosproject/onos:2.7.0
          ports: [{ containerPort: 8181 }, { containerPort: 6653 }]
          env:
            - name: ONOS_APPS
              value: "drivers,openflow,gui,fwd,proxyarp,hostprovider,linkprovider,flowruleprovider,statisticspublisher,prometheus"
            - name: ONOS_AUTO_START
              value: "true"
---
# 4. RL SERVING (DQN & PPO) + TỰ ĐỘNG SCALE (HPA)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rl-serving-dqn
  namespace: sdn-security
spec:
  securityContext:
    runAsUser: 0
  containers:
    - name: serving
      image: hmm0411/sdn-rl-serving:latest
      command:
        - "python"
        - "-u"
        - "-m"
        - "rl_engine.agent.api_serving"
        - "--port"
        - "8000"
      ports:
        - containerPort: 8000
        - containerPort: 9002
      env:
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: PYTHONPATH
          value: "/app"
        - name: MODEL_TYPE
          value: "dqn"
        - name: MLFLOW_TRACKING_URI
          value: "http://mlflow.sdn-security.svc.cluster.local:5000"
        - name: MLFLOW_S3_ENDPOINT_URL
          value: "http://s3:9005"
        - name: MLFLOW_S3_IGNORE_TLS
          value: "true"
        - name: AWS_DEFAULT_REGION
          value: "us-east-1"
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: ACCESS_KEY
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: SECRET_KEY
      volumeMounts:
        - name: app-vol
          mountPath: /app
  volumes:
    - name: app-vol
      hostPath:
        path: /home/g23520964/autonomous_sdn_security
        type: Directory
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rl-serving-dqn-hpa
  namespace: sdn-security
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rl-serving-dqn
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
