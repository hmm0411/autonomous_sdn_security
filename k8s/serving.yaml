# 5. CÁC THÀNH PHẦN LOGIC (Control Loop, Defense Agent, Dashboard, Auto-Trigger)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-loop
  namespace: sdn-security
spec:
  replicas: 1
  selector: { matchLabels: { app: control-loop } }
  template:
    metadata: { labels: { app: control-loop } }
    spec:
      containers:
        - name: loop
          image: hmm0411/sdn-control-loop:latest
          command: ["python", "control_loop/main_loop.py"]
          ports: [{ containerPort: 9100 }]
          env:
            - name: PYTHONPATH
              value: "/app"
            - name: PYTHONUNBUFFERED
              value: "1"
          volumeMounts: [{ name: app-vol, mountPath: /app }]
      volumes:
        - name: app-vol
          hostPath: { path: /home/g23520964/autonomous_sdn_security }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sdn-defense-agent
  namespace: sdn-security
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sdn-defense-agent
  template:
    metadata:
      labels:
        app: sdn-defense-agent
    spec:
      containers:
        - name: agent
          image: python:3.10-slim
          workingDir: /app
          command:
            - "sh"
            - "-c"
            - "pip install pandas numpy requests prometheus_client && python realtime_pipeline.py"
          ports:
            - containerPort: 8000
          env:
            - name: PYTHONPATH
              value: "/app"
            - name: PYTHONUNBUFFERED
              value: "1"
          volumeMounts:
            - name: app-vol
              mountPath: /app
      volumes:
        - name: app-vol
          hostPath:
            path: /home/g23520964/autonomous_sdn_security
            type: Directory
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sdn-dashboard
  namespace: sdn-security
spec:
  replicas: 1
  selector: { matchLabels: { app: sdn-dashboard } }
  template:
    metadata: { labels: { app: sdn-dashboard } }
    spec:
      containers:
        - name: dashboard
          image: python:3.10-slim
          workingDir: /app
          command:
            [
              "sh",
              "-c",
              "pip install streamlit pandas numpy requests prometheus_client && streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0",
            ]
          ports: [{ containerPort: 8501 }]
          volumeMounts: [{ name: app-vol, mountPath: /app }]
      volumes:
        - name: app-vol
          hostPath: { path: /home/g23520964/autonomous_sdn_security }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auto-trigger
  namespace: sdn-security
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auto-trigger
  template:
    metadata:
      labels:
        app: auto-trigger
    spec:
      serviceAccountName: auto-trigger-sa
      automountServiceAccountToken: true
      containers:
        - name: trigger
          image: hmm0411/sdn-auto-trigger:latest
          command: ["python", "-m", "mlops.main"]
          ports:
            - containerPort: 5001
          env:
            - name: PYTHONPATH
              value: "/app"
            - name: PYTHONUNBUFFERED
              value: "1"
          volumeMounts:
            - name: app-vol
              mountPath: /app
      volumes:
        - name: app-vol
          hostPath:
            path: /home/g23520964/autonomous_sdn_security
            type: Directory
