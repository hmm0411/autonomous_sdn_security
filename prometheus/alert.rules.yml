groups:
  - name: sdn_rl_alerts
    rules:
      - alert: Low_Reward_Detected
        # Cảnh báo nếu Reward trung bình của DQN rớt xuống dưới -600
        expr: episode_reward_mean{agent="dqn"} < -600
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "DQN Reward đang quá thấp!"
          description: "Reward trung bình của DQN là {{ $value }} trong 5 phút qua. Cần Rollback hoặc Retrain."
      - alert: PPO_Reward_Drop
        # Cảnh báo nếu Reward trung bình của PPO rớt xuống dưới -500
        expr: episode_reward_mean{agent="ppo"} < -500
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "PPO Reward đang quá thấp!"
          description: "Reward trung bình của PPO là {{ $value }} trong 5 phút qua. Cần Rollback hoặc Retrain."
      - alert: Control_Loop_Anomaly
        # Cảnh báo nếu latency của control loop vượt quá 100ms
        expr: control_loop_latency_seconds > 0.1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Độ trễ của Control Loop đang cao!"
          description: "Latency của control loop là {{ $value }} giây. Cần kiểm tra hiệu suất hệ thống."
      - alert: SDN_Defense_Anomaly
        # Cảnh báo nếu sdn_current_score của SDN Defense Agent là 1
        expr: sdn_current_score > 70
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "SDN Defense Agent phát hiện tấn công!"
          description: "Attack indicator là {{ $value }}. Cần kiểm tra hệ thống ngay lập tức."

      - alert: Staging_Outperforms_Production
        # Tính trung bình reward trong 3 phút, nếu Staging cao hơn Prod 0.5 điểm thì trigger
        expr: avg_over_time(rl_reward{stage="staging"}[3m]) > (avg_over_time(rl_reward{stage="production"}[3m]) + 0.5)
        for: 2m
        labels:
          severity: critical
          action: promote_model
        annotations:
          summary: "Model Staging đang hoạt động tốt hơn Production!"
          description: "Điểm reward của Staging vượt trội hơn Production trong 3 phút qua. Đang tiến hành thăng cấp tự động."
