name: NT549 CI

on:
  push:
    branches:
      - nt549-rl

jobs:
  test-rl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r rl_engine/requirements.txt

      - name: Create Data Directory
        run: |
          mkdir -p data/processed
          mkdir -p models
          mkdir -p results
          mkdir -p logs

      - name: Download Dataset
        run: |
          echo "Downloading training dataset..."
          wget -q -O data/processed/train_data.csv "https://github.com/user-attachments/files/26481488/train_data.csv"
          wget -q -O data/processed/test_data.csv "https://github.com/user-attachments/files/26481487/test_data.csv"
          ls -lh data/processed/

      - name: Run Environment Test
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -c "
          import sys
          import pandas as pd
          from rl_engine.offline_env import OfflineSDNEnv
          print('Testing Offline Environment...')
          df_train = pd.read_csv('data/processed/train_data.csv')
          env = OfflineSDNEnv(dataframe=df_train)
          state, info = env.reset()
          print(f'Environment initialized with state shape: {len(state)}')
          print(f'State keys: {list(state.keys()) if isinstance(state, dict) else type(state)}')
          "

      - name: Run DQN Training Test
        env:
          PYTHONPATH: ${{ github.workspace }}
          CI: "true"
          MLFLOW_BACKEND_STORE_URI: "${{ github.workspace }}/mlruns"
        run: |
          export PYTHONPATH="${{ github.workspace }}:$PYTHONPATH"
          cd ${{ github.workspace }}
          echo "=== Running DQN Training ==="
          echo "Python path: $PYTHONPATH"
          python -m rl_engine.agent.train_dqn
          echo "DQN Training completed"

      - name: Run PPO Training Test
        env:
          PYTHONPATH: ${{ github.workspace }}
          CI: "true"
          MLFLOW_BACKEND_STORE_URI: "${{ github.workspace }}/mlruns"
        run: |
          export PYTHONPATH="${{ github.workspace }}:$PYTHONPATH"
          cd ${{ github.workspace }}
          echo "=== Running PPO Training ==="
          echo "Python path: $PYTHONPATH"
          python -m rl_engine.agent.train_ppo
          echo "PPO Training completed"

      - name: Verify Output Files
        run: |
          echo "=== Checking Results ==="
          if [ -d results ]; then
            echo "Results directory:"
            ls -lh results/
          else
            echo "No results directory"
          fi

          if [ -d models ]; then
            echo "Models directory:"
            ls -lh models/
          else
            echo "No models directory"
          fi

          if [ -d mlruns ]; then
            echo "MLflow runs:"
            find mlruns -type f | head -20
          fi
          echo "Verification completed"

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: training-results-${{ github.run_id }}
          path: |
            results/
            models/
            mlruns/
            logs/
          retention-days: 30
