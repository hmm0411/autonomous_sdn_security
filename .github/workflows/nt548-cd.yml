name: NT548 SDN MLOps CD

on:
  workflow_run:
    workflows:
      - NT548 MLOps CI
    types:
      - completed
    branches:
      - nt548-mlops

  workflow_dispatch:

concurrency:
  group: nt548-sdn-mlops-cd
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref_name }}

      - name: Set up Python for validation
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Validate Grafana dashboard JSON before deploy
        run: |
          python -m json.tool grafana/dashboards/sdn_rl_dashboard.json > /tmp/dashboard_check.json

      - name: Validate Kubernetes YAML before deploy
        run: |
          python - <<'PY'
          import yaml

          files = [
              "k8s/base.yaml",
              "k8s/serving.yaml",
              "k8s/monitoring-jobs.yaml",
          ]

          for path in files:
              with open(path, "r", encoding="utf-8") as f:
                  list(yaml.safe_load_all(f))
              print(f"YAML OK: {path}")
          PY

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Validate Kubernetes connection
        run: |
          kubectl get nodes
          kubectl get ns sdn-security || kubectl create ns sdn-security

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/base.yaml
          kubectl apply -f k8s/serving.yaml
          kubectl apply -f k8s/monitoring-jobs.yaml

      - name: Update Grafana dashboard ConfigMap
        run: |
          kubectl delete configmap grafana-dashboards -n sdn-security --ignore-not-found

          kubectl create configmap grafana-dashboards \
            -n sdn-security \
            --from-file=sdn_rl_dashboard.json=grafana/dashboards/sdn_rl_dashboard.json

      - name: Restart deployments
        run: |
          kubectl rollout restart deployment/prometheus -n sdn-security
          kubectl rollout restart deployment/grafana -n sdn-security
          kubectl rollout restart deployment/alertmanager -n sdn-security
          kubectl rollout restart deployment/rl-serving-dqn -n sdn-security
          kubectl rollout restart deployment/rl-serving-ppo -n sdn-security
          kubectl rollout restart deployment/control-loop -n sdn-security
          kubectl rollout restart deployment/sdn-defense-agent -n sdn-security
          kubectl rollout restart deployment/auto-trigger -n sdn-security

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/prometheus -n sdn-security --timeout=180s
          kubectl rollout status deployment/grafana -n sdn-security --timeout=180s
          kubectl rollout status deployment/alertmanager -n sdn-security --timeout=180s
          kubectl rollout status deployment/rl-serving-dqn -n sdn-security --timeout=180s
          kubectl rollout status deployment/rl-serving-ppo -n sdn-security --timeout=180s
          kubectl rollout status deployment/control-loop -n sdn-security --timeout=180s
          kubectl rollout status deployment/sdn-defense-agent -n sdn-security --timeout=180s
          kubectl rollout status deployment/auto-trigger -n sdn-security --timeout=180s

      - name: Show deployment status
        run: |
          kubectl get pods -n sdn-security
          kubectl get svc -n sdn-security
          kubectl get jobs -n sdn-security
          kubectl get cronjob -n sdn-security
